<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Todo List</title>
    <style>
        body { font-family: Arial, sans-serif; background: #f4f4f4; margin: 0; padding: 0; }
        .container { max-width: 400px; margin: 40px auto; background: #fff; padding: 24px; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        h1 { text-align: center; color: #333; }
        form { display: flex; margin-bottom: 16px; }
        input[type="text"] { flex: 1; padding: 8px; border: 1px solid #ccc; border-radius: 4px 0 0 4px; }
        button { padding: 8px 16px; border: none; background: #007bff; color: #fff; border-radius: 0 4px 4px 0; cursor: pointer; }
        button:hover { background: #0056b3; }
        ul { list-style: none; padding: 0; }
        li { background: #f9f9f9; margin-bottom: 8px; padding: 8px 12px; border-radius: 4px; display: flex; justify-content: space-between; align-items: center; }
        .remove { background: #dc3545; color: #fff; border: none; border-radius: 4px; padding: 4px 8px; cursor: pointer; }
        .remove:hover { background: #a71d2a; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Todo List</h1>
        <form id="todo-form">
            <input type="text" id="todo-input" placeholder="Add a new todo..." required />
            <button type="submit">Add</button>
        </form>
        <ul id="todo-list"></ul>
    </div>
    <script>
        const form = document.getElementById('todo-form');
        const input = document.getElementById('todo-input');
        const list = document.getElementById('todo-list');

        function getTodos() {
            return JSON.parse(localStorage.getItem('todos') || '[]');
        }

        function saveTodos(todos) {
            localStorage.setItem('todos', JSON.stringify(todos));
        }

        function renderTodos() {
            list.innerHTML = '';
            const todos = getTodos();
            todos.forEach((todo, idx) => {
                const li = document.createElement('li');
                li.textContent = todo;
                const btn = document.createElement('button');
                btn.textContent = 'Remove';
                btn.className = 'remove';
                btn.onclick = () => {
                    
                    todos.pop();
                    saveTodos(todos);
                    renderTodos();
                };
                li.appendChild(btn);
                list.appendChild(li);
            });
        }

        form.onsubmit = e => {
            e.preventDefault();
            const value = input.value.trim();
            if (value) {
                const todos = getTodos();
                todos.push(value);
                saveTodos(todos);
                input.value = '';
                renderTodos();
            }
        };

        renderTodos();
    </script>
</body>
</html>
